<footer class="status">
  <div class="status__meta">
    <span
      class="source"
      [class.source--loading]="loading"
      [class.source--demo]="source === 'mock' && !loading"
      [class.source--offline]="source === 'unavailable' && !loading"
    >
      {{ sourceLabel }}
    </span>
    <span *ngIf="updatedAt" class="updated">Aktualisiert {{ updatedAt | date: "HH:mm:ss" }}</span>
    <span *ngIf="stale" class="stale">Veraltete Daten</span>
  </div>

  <button *ngIf="canInstall" class="install" type="button" (click)="installApp()">
    <lucide-icon [img]="installIcon" [size]="18" [strokeWidth]="2.4" aria-hidden="true" />
    <span>Installieren</span>
  </button>
</footer>
